name: .NET CI & SonarCloud Analysis

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-analyze:
    runs-on: ubuntu-latest
    name: Build, Test & SonarCloud
    
    steps:
    # 1. Descargar el código
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Necesario para que SonarCloud obtenga el historial de commits

    # 2. Instalar .NET SDK
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    # 3. Restaurar paquetes
    - name: Restore dependencies
      run: dotnet restore

    # 4. Compilar el proyecto
    - name: Build
      run: dotnet build --no-restore --configuration Release

    # 5. Ejecutar pruebas unitarias
    - name: Test
      run: dotnet test --no-build --configuration Release --verbosity normal

    # 6. Ejecutar análisis de SonarCloud
    - name: SonarCloud Scan
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        dotnet tool install --global dotnet-sonarscanner
        dotnet sonarscanner begin /k:"ioseph06-api-restful" /o:"ioseph06" /d:sonar.login="${{ secrets.SONAR_TOKEN }}" /d:sonar.host.url="https://sonarcloud.io"
        dotnet build --no-incremental
        dotnet sonarscanner end /d:sonar.login="${{ secrets.SONAR_TOKEN }}"